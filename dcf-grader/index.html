<!-- v1: Upload + grade .xlsx DCF model 2026-05-06 -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <title>DCF Model Reviewer — Prepped Talent</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #0f0a1f 0%, #1a0e35 100%);
      min-height: 100vh;
      color: #fff;
      padding: 32px 16px;
    }
    .container { max-width: 720px; margin: 0 auto; }
    .brand { color: #ec4899; font-size: 12px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; margin-bottom: 8px; }
    h1 {
      font-size: 28px; font-weight: 800; line-height: 1.2; margin-bottom: 12px;
    }
    h1 span { background: linear-gradient(135deg, #ec4899, #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .subtitle { color: rgba(255,255,255,0.55); font-size: 15px; margin-bottom: 32px; line-height: 1.5; }

    .card {
      background: rgba(45,16,87,0.45);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(236,72,153,0.2);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 16px;
    }

    label.field { display: block; margin-bottom: 18px; }
    label.field span.lbl {
      display: block;
      color: rgba(255,255,255,0.5);
      font-size: 12px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.05em;
      margin-bottom: 8px;
    }
    input[type="text"], input[type="email"] {
      width: 100%;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(168,85,247,0.3);
      border-radius: 10px;
      padding: 12px 14px;
      color: #fff;
      font-size: 15px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }
    input[type="text"]:focus, input[type="email"]:focus { border-color: #ec4899; }
    input::placeholder { color: rgba(255,255,255,0.3); }

    .drop-zone {
      border: 2px dashed rgba(236,72,153,0.35);
      border-radius: 12px;
      padding: 32px 16px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      background: rgba(236,72,153,0.04);
    }
    .drop-zone:hover, .drop-zone.dragover {
      border-color: #ec4899;
      background: rgba(236,72,153,0.1);
    }
    .drop-zone.loaded {
      border-style: solid;
      border-color: #a855f7;
      background: rgba(168,85,247,0.1);
    }
    .drop-zone .icon { font-size: 32px; margin-bottom: 8px; display: block; }
    .drop-zone .hint { color: rgba(255,255,255,0.45); font-size: 13px; margin-top: 4px; }

    button.primary {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      border: none;
      background: linear-gradient(135deg, #ec4899, #a855f7);
      color: #fff;
      transition: opacity 0.2s;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      margin-top: 8px;
    }
    button.primary:hover { opacity: 0.9; }
    button.primary:disabled { opacity: 0.4; cursor: not-allowed; }

    .err { color: #ef4444; font-size: 13px; margin-top: 10px; }
    .spinner {
      display: inline-block; width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-screen {
      text-align: center;
      padding: 40px 16px;
    }
    .loading-screen .big-spinner {
      width: 56px; height: 56px;
      border-width: 4px;
      margin: 0 auto 24px;
    }
    .loading-screen p { color: rgba(255,255,255,0.55); font-size: 14px; margin-top: 6px; }

    .report .total {
      display: flex; align-items: baseline; gap: 6px;
      margin-bottom: 20px;
    }
    .report .total .score { font-size: 56px; font-weight: 800; color: #fff; line-height: 1; }
    .report .total .max { font-size: 22px; color: rgba(255,255,255,0.45); }

    .component {
      border-left: 4px solid #a855f7;
      padding: 14px 18px;
      margin-bottom: 14px;
      background: rgba(255,255,255,0.04);
      border-radius: 0 10px 10px 0;
    }
    .component .head {
      display: flex; align-items: baseline; justify-content: space-between;
      margin-bottom: 8px;
    }
    .component .name { font-weight: 700; font-size: 15px; color: #fff; }
    .component .pts {
      font-size: 14px; color: rgba(255,255,255,0.6);
    }
    .component .pts strong { color: #ec4899; font-weight: 700; }
    .component .commentary {
      color: rgba(255,255,255,0.7);
      font-size: 13px; line-height: 1.55;
      white-space: pre-wrap;
    }

    .violations { margin-top: 16px; }
    .violations h3 {
      color: rgba(255,255,255,0.7);
      font-size: 12px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.05em;
      margin-bottom: 8px;
    }
    .violations ul { list-style: none; padding: 0; }
    .violations li {
      background: rgba(239,68,68,0.1);
      border-left: 3px solid #ef4444;
      padding: 8px 12px;
      border-radius: 0 6px 6px 0;
      margin-bottom: 6px;
      font-size: 13px;
      color: rgba(255,255,255,0.85);
    }

    .actions { display: flex; gap: 8px; margin-top: 20px; }
    .actions button {
      flex: 1;
      padding: 11px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.05);
      color: rgba(255,255,255,0.7);
    }
    .actions button.primary {
      flex: 2;
      border: none;
      background: linear-gradient(135deg, #ec4899, #a855f7);
      color: #fff;
      font-weight: 700;
      margin-top: 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="brand">Prepped Talent</div>
    <h1>DCF Model <span>Reviewer</span></h1>
    <p class="subtitle">Upload your completed DCF model in Excel format. You'll get an AI-graded report with component scores and specific feedback within 60 seconds.</p>

    <div id="app"></div>
  </div>

  <!-- ExcelJS for browser-side parsing (cells, formulas, font colours). Much faster than server-side. -->
  <script src="https://cdn.jsdelivr.net/npm/exceljs@4.4.0/dist/exceljs.min.js"></script>
  <script src="./app.js"></script>
</body>
</html>
