<script type="text/babel">
const _R = window.Recharts || {};
const {
  LineChart = () => null, Line = () => null, XAxis = () => null, YAxis = () => null,
  CartesianGrid = () => null, Tooltip = () => null, Legend = () => null, ResponsiveContainer = ({children}) => children

const { useState, useRef, useCallback, useEffect, useMemo } = React;

// ─── Helpers ────────────────────────────────────────────────────────────────

function getMondayOf(date) {
  const d = new Date(date);
  const day = d.getDay();
  const diff = (day === 0 ? -6 : 1 - day);
  d.setDate(d.getDate() + diff);
  d.setHours(0, 0, 0, 0);
  return d;
}

function formatWeekLabel(mondayDate) {
  const d = new Date(mondayDate);
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

function weekKey(mondayDate) {
  return new Date(mondayDate).toISOString().slice(0, 10);
}

function parseDate(str) {
  if (!str) return null;
  // Handle LinkedIn's 2-digit year format: "3/16/26, 5:02 AM"
  const liMatch = str.match(/^(\d{1,2})\/(\d{1,2})\/(\d{2}),?\s*(.+)$/);
  if (liMatch) {
    const [, month, day, shortYear, time] = liMatch;
    const year = parseInt(shortYear) < 70 ? 2000 + parseInt(shortYear) : 1900 + parseInt(shortYear);
    const d = new Date(`${year}-${month.padStart(2,'0')}-${day.padStart(2,'0')} ${time.replace(' UTC','')}`);
    return isNaN(d.getTime()) ? null : d;
  }
  // Handle "17 Mar 2026" format from Connections.csv
  const connMatch = str.match(/^(\d{1,2})\s+(\w{3})\s+(\d{4})$/);
  if (connMatch) {
    const d = new Date(`${connMatch[2]} ${connMatch[1]}, ${connMatch[3]}`);
    return isNaN(d.getTime()) ? null : d;
  }
  const d = new Date(str);
  return isNaN(d.getTime()) ? null : d;
}

const CATCHUP_KEYWORDS = [
  "let's catch up","lets catch up","catch up","grab coffee",
  "hop on a call","schedule a call","book a time","calendly",
  "zoom link","looking forward to chatting","confirmed for","talk on"
];

function hasCatchupKeyword(text) {
  if (!text) return false;
  const lower = text.toLowerCase();
  return CATCHUP_KEYWORDS.some(k => lower.includes(k));
}

// ─── Sample Data Generator ──────────────────────────────────────────────────

function generateSampleData() {
  const today = new Date('2026-04-06');
  const monday = getMondayOf(today);

  const weeks = [];
  for (let i = 7; i >= 0; i--) {
    const d = new Date(monday);
    d.setDate(d.getDate() - i * 7);
    weeks.push(new Date(d));
  }

  const names = [
    'Alex Johnson','Maria Garcia','Chris Lee','Taylor Brown','Jordan Smith',
    'Sam Wilson','Casey Martinez','Morgan Davis','Riley Thompson','Drew Anderson',
    'Quinn Harris','Avery Clark','Blake Robinson','Reese Walker','Skyler Hall',
    'Cameron Young','Peyton Wright','Finley Lewis','Emery Scott','Hayden Green'
  ];

  const companies = [
    'Goldman Sachs','McKinsey','Bain & Company','JPMorgan','Morgan Stanley',
    'BCG','Deloitte','EY','KPMG','PwC','Blackstone','KKR','Apollo','Citadel','Bridgewater'
  ];

  const ME = 'Alex Chen';
  const rand = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;
  const pick = arr => arr[Math.floor(Math.random() * arr.length)];

  const weeklyStats = weeks.map((monday, wi) => {
    const sent = rand(15, 30);
    const accepted = Math.round(sent * (rand(70, 85) / 100));
    const messages = rand(20, 50);
    const catchups = rand(2, 5);
    return { monday, sent, accepted, messages, catchups };
  });

  const invitations = [];
  const messages = [];

  weeklyStats.forEach(({ monday, sent, accepted }) => {
    for (let i = 0; i < sent; i++) {
      const sentDate = new Date(monday);
      sentDate.setDate(sentDate.getDate() + rand(0, 6));
      const toName = pick(names);
      const status = i < accepted ? 'Accepted' : 'Pending';
      invitations.push({
        'From': ME,
        'To': toName,
        'Sent At': sentDate.toISOString(),
        'Status': status,
        'Company': pick(companies),
      });
    }
  });

  const catchupMessages = [
    "Would love to catch up over coffee sometime!",
    "Let's hop on a call to discuss your experience.",
    "Happy to grab coffee and chat about your journey.",
    "Schedule a call with me via my Calendly link.",
    "Looking forward to chatting with you next week!",
    "Confirmed for Thursday — zoom link below.",
    "Let's catch up — I'll send a calendar invite.",
    "Can we book a time to talk on a call?",
  ];

  const regularMessages = [
    "Hi, I came across your profile and was impressed by your background.",
    "I'd love to learn more about your experience in investment banking.",
    "Thank you for connecting! Would love to hear about your role.",
    "Great to connect — your work at {company} sounds fascinating.",
    "I'm exploring opportunities in M&A and would love your insights.",
    "Your career path is really inspiring — any advice for someone starting out?",
    "I noticed we share mutual connections at {company}.",
    "I'm a student interested in finance — would appreciate any guidance.",
    "Congratulations on your recent promotion!",
    "I enjoyed your recent post about deal flow — very insightful.",
  ];

  weeklyStats.forEach(({ monday, messages: msgCount, catchups }) => {
    const contactPool = invitations
      .filter(inv => inv['Status'] === 'Accepted')
      .map(inv => inv['To']);

    for (let i = 0; i < msgCount; i++) {
      const msgDate = new Date(monday);
      msgDate.setDate(msgDate.getDate() + rand(0, 6));
      msgDate.setHours(rand(8, 20), rand(0, 59));

      const isCatchup = i < catchups;
      const contact = pick(contactPool.length ? contactPool : names);
      const body = isCatchup
        ? pick(catchupMessages)
        : pick(regularMessages).replace('{company}', pick(companies));

      messages.push({
        'FROM': ME,
        'TO': contact,
        'DATE': msgDate.toISOString(),
        'CONTENT': body,
        'CONVERSATION ID': `conv_${monday.toISOString().slice(0,10)}_${i}`,
      });

      if (isCatchup) {
        const replyDate = new Date(msgDate);
        replyDate.setDate(replyDate.getDate() + rand(0, 2));
        replyDate.setHours(rand(9, 18), rand(0, 59));
        messages.push({
          'FROM': contact,
          'TO': ME,
          'DATE': replyDate.toISOString(),
          'CONTENT': "Sounds great! I'd love that. Let me check my calendar.",
          'CONVERSATION ID': `conv_${monday.toISOString().slice(0,10)}_${i}`,
        });
      }
    }
  });

  const connections = invitations
    .filter(inv => inv['Status'] === 'Accepted')
    .map(inv => ({
      'First Name': inv['To'].split(' ')[0],
      'Last Name': inv['To'].split(' ').slice(1).join(' '),
      'Company': inv['Company'],
      'Connected On': inv['Sent At'],
    }));

  return { invitations, messages, connections, ME };
}

// ─── Data Processing ─────────────────────────────────────────────────────────

function processData(invitations, messages, connections) {
  const senderCount = {};
  messages.forEach(m => {
    const from = m['FROM'] || m['From'] || '';
    if (from) senderCount[from] = (senderCount[from] || 0) + 1;
  });
  const ME = Object.entries(senderCount).sort((a,b) => b[1]-a[1])[0]?.[0] || '';

  // Build a set of connected names for acceptance matching
  // Connections.csv has "First Name" + "Last Name", Invitations has "To" as full name
  const connectedNames = new Set();
  connections.forEach(c => {
    const first = (c['First Name'] || '').trim();
    const last = (c['Last Name'] || '').trim();
    if (first || last) connectedNames.add(`${first} ${last}`.trim().toLowerCase());
  });

  // Filter to outgoing invitations only
  const outgoing = invitations.filter(inv => {
    const dir = (inv['Direction'] || inv['direction'] || '').toUpperCase();
    // If no Direction column, check if From matches ME
    if (dir) return dir === 'OUTGOING';
    const from = inv['From'] || inv['from'] || '';
    return from === ME || from.toLowerCase().includes('maitrya');
  });

  const invByWeek = {};
  outgoing.forEach(inv => {
    const rawDate = inv['Sent At'] || inv['sent_at'] || inv['Date'] || '';
    const d = parseDate(rawDate);
    if (!d) return;
    const mon = getMondayOf(d);
    const k = weekKey(mon);
    if (!invByWeek[k]) invByWeek[k] = { monday: mon, sent: [], accepted: [] };
    invByWeek[k].sent.push(inv);

    // Check acceptance: if Status column exists, use it; otherwise match To name against Connections
    const status = (inv['Status'] || inv['status'] || '').toLowerCase();
    if (status === 'accepted' || status === 'connected') {
      invByWeek[k].accepted.push(inv);
    } else if (!inv['Status'] && !inv['status']) {
      // No Status column — check if the invitee appears in Connections
      const toName = (inv['To'] || inv['to'] || '').trim().toLowerCase();
      if (connectedNames.has(toName)) {
        inv._accepted = true;
        invByWeek[k].accepted.push(inv);
      }
    }
  });

  const msgByWeek = {};
  messages.forEach(msg => {
    const rawDate = msg['DATE'] || msg['Date'] || msg['date'] || '';
    const d = parseDate(rawDate);
    if (!d) return;
    const mon = getMondayOf(d);
    const k = weekKey(mon);
    if (!msgByWeek[k]) msgByWeek[k] = { monday: mon, userMsgs: [], allMsgs: [] };
    msgByWeek[k].allMsgs.push(msg);
    const from = msg['FROM'] || msg['From'] || '';
    if (from === ME) msgByWeek[k].userMsgs.push(msg);
  });

  function detectCatchups(allMsgs) {
    const convMap = {};
    allMsgs.forEach(m => {
      const cid = m['CONVERSATION ID'] || m['Conversation ID'] || m['conversation_id'] || '';
      if (!convMap[cid]) convMap[cid] = [];
      convMap[cid].push(m);
    });

    let catchupMsgs = [];
    Object.values(convMap).forEach(thread => {
      const sorted = [...thread].sort((a,b) => {
        const da = parseDate(a['DATE']||a['Date']||'');
        const db = parseDate(b['DATE']||b['Date']||'');
        return (da||0) - (db||0);
      });
      for (let i = 0; i < sorted.length - 1; i++) {
        const msg = sorted[i];
        const from = msg['FROM'] || msg['From'] || '';
        const content = msg['CONTENT'] || msg['Content'] || msg['content'] || '';
        if (from === ME && hasCatchupKeyword(content)) {
          const nextMsg = sorted[i+1];
          const nextFrom = nextMsg['FROM'] || nextMsg['From'] || '';
          if (nextFrom !== ME) {
            catchupMsgs.push(msg);
            break;
          }
        }
      }
    });
    return catchupMsgs;
  }

  const allKeys = new Set([...Object.keys(invByWeek), ...Object.keys(msgByWeek)]);
  const weeks = Array.from(allKeys).sort();

  const weekData = weeks.map(k => {
    const inv = invByWeek[k] || { monday: new Date(k), sent: [], accepted: [] };
    const msg = msgByWeek[k] || { monday: new Date(k), userMsgs: [], allMsgs: [] };
    const monday = inv.monday || msg.monday;
    const catchupList = detectCatchups(msg.allMsgs);

    return {
      key: k,
      monday,
      label: `Week of ${formatWeekLabel(monday)}`,
      shortLabel: new Date(monday).toLocaleDateString('en-US', { month: 'short', day: 'numeric' }),
      requestsSent: inv.sent.length,
      accepted: inv.accepted.length,
      acceptanceRate: inv.sent.length > 0 ? Math.round((inv.accepted.length / inv.sent.length) * 100) : 0,
      messagesSent: msg.userMsgs.length,
      catchupsBooked: catchupList.length,
      invitations: inv.sent,
      messages: msg.userMsgs,
      catchups: catchupList,
      allMessages: msg.allMsgs,
    };
  });

  return { weekData, ME };
}

// ─── MetricCard ───────────────────────────────────────────────────────────────

function MetricCard({ label, value, delta, icon, iconBg, suffix = '', isRate = false }) {
  const deltaNum = typeof delta === 'number' ? delta : 0;
  const deltaDisplay = isRate
    ? `${deltaNum >= 0 ? '+' : ''}${deltaNum}%`
    : `${deltaNum >= 0 ? '+' : ''}${deltaNum}`;
  const deltaClass = deltaNum > 0 ? 'delta-up' : deltaNum < 0 ? 'delta-down' : 'delta-neutral';

  return (
    <div className="glass-card p-5 flex flex-col gap-3">
      <div className="flex items-start justify-between">
        <div>
          <p style={{ color: 'rgba(255,255,255,0.5)', fontSize: '0.78rem', fontWeight: 500, textTransform: 'uppercase', letterSpacing: '0.08em' }}>{label}</p>
          <p style={{ fontSize: '2.4rem', fontWeight: 800, color: '#fff', lineHeight: 1.1, marginTop: 4 }}>
            {value}{suffix}
          </p>
        </div>
        <div className="metric-icon" style={{ background: iconBg }}>
          {icon}
        </div>
      </div>
      <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
        <span className={deltaClass} style={{ fontSize: '0.85rem', fontWeight: 600 }}>{deltaDisplay}</span>
        <span style={{ color: 'rgba(255,255,255,0.35)', fontSize: '0.78rem' }}>vs prior week</span>
      </div>
    </div>
  );
}

// ─── PeerComparison ───────────────────────────────────────────────────────────

function PeerComparison({ weekData }) {
  if (!weekData) return null;

  const benchmarks = [
    { label: 'Requests Sent', userVal: weekData.requestsSent, benchmarkVal: 18, unit: '', percentile: 72 },
    { label: 'Acceptance Rate', userVal: weekData.acceptanceRate, benchmarkVal: 68, unit: '%', percentile: 81 },
    { label: 'Messages Sent', userVal: weekData.messagesSent, benchmarkVal: 28, unit: '', percentile: 65 },
    { label: 'Catch-ups Booked', userVal: weekData.catchupsBooked, benchmarkVal: 2, unit: '', percentile: 78 },
  ];

  const maxVals = {
    'Requests Sent': 40, 'Acceptance Rate': 100, 'Messages Sent': 70, 'Catch-ups Booked': 8
  };

  return (
    <div className="glass-card p-6">
      <h3 style={{ color: '#fff', fontWeight: 700, fontSize: '1.05rem', marginBottom: 20 }}>
        Peer Benchmarks
      </h3>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 20 }}>
        {benchmarks.map(b => {
          const maxVal = maxVals[b.label];
          const userPct = Math.min((b.userVal / maxVal) * 100, 100);
          const benchPct = Math.min((b.benchmarkVal / maxVal) * 100, 100);
          return (
            <div key={b.label}>
              <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 7 }}>
                <span style={{ color: 'rgba(255,255,255,0.7)', fontSize: '0.83rem', fontWeight: 500 }}>{b.label}</span>
                <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                  <span style={{ color: '#c9a84c', fontSize: '0.83rem', fontWeight: 700 }}>
                    You: {b.userVal}{b.unit}
                  </span>
                  <span style={{ color: 'rgba(255,255,255,0.35)', fontSize: '0.75rem' }}>
                    Avg: {b.benchmarkVal}{b.unit}
                  </span>
                </div>
              </div>
              <div style={{ position: 'relative', height: 10 }}>
                <div className="progress-bar-bg" style={{ position: 'absolute', top: 1, height: 8 }}/>
                <div style={{
                  position: 'absolute', top: 0, left: `${benchPct}%`,
                  width: 2, height: 10, background: 'rgba(255,255,255,0.3)', borderRadius: 2, zIndex: 2
                }}/>
                <div className="progress-bar-fill" style={{ position: 'absolute', top: 1, width: `${userPct}%`, zIndex: 1 }}/>
              </div>
              <div style={{ marginTop: 5, textAlign: 'right' }}>
                <span style={{
                  fontSize: '0.72rem', fontWeight: 600,
                  color: b.percentile >= 75 ? '#4ade80' : b.percentile >= 50 ? '#c9a84c' : '#f87171'
                }}>
                  {b.percentile}th percentile
                </span>
              </div>
            </div>
          );
        })}
      </div>

function ActivityLog({ weekData }) {

// ─── Upload Screen ────────────────────────────────────────────────────────────

function UploadScreen({ onDataLoaded, onSampleData }) {
  const [dragging, setDragging] = useState(false);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');
  const fileRef = useRef();

  const processZip = useCallback(async (file) => {
    setLoading(true);
    setError('');
    try {
      const zip = await JSZip.loadAsync(file);
      const files = {};
      zip.forEach((relativePath, zipEntry) => {
        files[relativePath.toLowerCase()] = zipEntry;
      });

      const findFile = (name) => {
        const lower = name.toLowerCase();
        const key = Object.keys(files).find(k => k.split('/').pop() === lower);
        return key ? files[key] : null;
      };

      const connectionsEntry = findFile('connections.csv');
      const messagesEntry = findFile('messages.csv');
      const invitationsEntry = findFile('invitations.csv');

      const missing = [];
      if (!connectionsEntry) missing.push('Connections.csv');
      if (!messagesEntry) missing.push('messages.csv');
      if (!invitationsEntry) missing.push('Invitations.csv');

      if (missing.length === 3) {
        setError(`No recognized CSVs found in ZIP. Missing: ${missing.join(', ')}`);
        setLoading(false);
        return;
      }

      const parseCSV = async (entry, skipLines = 0) => {
        if (!entry) return [];
        let text = await entry.async('text');
        // Skip leading non-CSV lines (e.g., LinkedIn disclaimer in Connections.csv)
        if (skipLines > 0) {
          const lines = text.split('\n');
          text = lines.slice(skipLines).join('\n');
        }
        const result = Papa.parse(text, { header: true, skipEmptyLines: true });
        return result.data;
      };

      // Connections.csv has a 3-line disclaimer header before the actual CSV
      const connectionsText = connectionsEntry ? await connectionsEntry.async('text') : '';
      const connSkip = connectionsText.startsWith('Notes:') ? 3 : 0;

      const [connections, messages, invitations] = await Promise.all([
        parseCSV(connectionsEntry, connSkip),
        parseCSV(messagesEntry),
        parseCSV(invitationsEntry),
      ]);

      onDataLoaded({ invitations, messages, connections, missing });
    } catch (e) {
      setError('Failed to read ZIP file. Please ensure it is a valid LinkedIn data export.');
      console.error(e);
    }
    setLoading(false);
  }, [onDataLoaded]);

  const onDrop = useCallback((e) => {
    e.preventDefault();
    setDragging(false);
    const file = e.dataTransfer.files[0];
    if (file && file.name.endsWith('.zip')) {
      processZip(file);
    } else {
      setError('Please upload a .zip file (LinkedIn data export).');
    }
  }, [processZip]);

  const onFileChange = (e) => {
    const file = e.target.files[0];
    if (file) processZip(file);
  };

  return (
    <div style={{ minHeight: '100vh', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', padding: '32px 16px' }}>
      <div style={{ marginBottom: 40, textAlign: 'center' }}>
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 12, marginBottom: 10 }}>
          <div style={{ width: 42, height: 42, borderRadius: 12, background: 'linear-gradient(135deg, #c9a84c, #e8c97e)', display: 'flex', alignItems: 'center', justifyContent: 'center', fontWeight: 900, fontSize: 20, color: '#1a1a2e' }}>P</div>
          <span style={{ fontSize: '1.5rem', fontWeight: 800, color: '#fff' }}>Prepped <span className="gold-gradient">Talent</span></span>
        </div>
        <p style={{ color: 'rgba(255,255,255,0.45)', fontSize: '0.9rem' }}>LinkedIn Networking Activity Dashboard</p>
      </div>

      <div
        className={`glass-card${dragging ? ' drop-zone-active' : ''}`}
        style={{
          width: '100%', maxWidth: 560,
          border: `2px dashed ${dragging ? '#c9a84c' : 'rgba(201,168,76,0.25)'}`,
          borderRadius: 20, padding: '52px 32px', textAlign: 'center', cursor: 'pointer',
          transition: 'all 0.2s'
        }}
        onDragOver={(e) => { e.preventDefault(); setDragging(true); }}
        onDragLeave={() => setDragging(false)}
        onDrop={onDrop}
        onClick={() => fileRef.current.click()}
      >
        {loading ? (
          <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 16 }}>
            <div className="spinner"/>
            <p style={{ color: 'rgba(255,255,255,0.6)', fontSize: '0.9rem' }}>Parsing your LinkedIn data...</p>
          </div>
        ) : (
          <>
            <div style={{ color: 'rgba(201,168,76,0.7)', marginBottom: 16 }}><IconUpload /></div>
            <p style={{ color: '#fff', fontWeight: 700, fontSize: '1.1rem', marginBottom: 8 }}>
              Drop your LinkedIn data export here
            </p>
            <p style={{ color: 'rgba(255,255,255,0.4)', fontSize: '0.85rem', marginBottom: 20 }}>
              Upload the <strong style={{ color: 'rgba(255,255,255,0.65)' }}>.zip</strong> file downloaded from LinkedIn Settings &rarr; Data Privacy &rarr; Get a copy of your data
            </p>
            <div style={{
              display: 'inline-flex', alignItems: 'center', gap: 8,
              padding: '10px 22px', borderRadius: 10,
              background: 'rgba(201,168,76,0.12)', border: '1px solid rgba(201,168,76,0.3)',
              color: '#c9a84c', fontWeight: 600, fontSize: '0.87rem'
            }}>
              <IconZip /> Browse .zip file
            </div>
            <input ref={fileRef} type="file" accept=".zip" style={{ display: 'none' }} onChange={onFileChange} />
          </>
        )}
      </div>

      {error && (
        <div style={{
          marginTop: 16, padding: '12px 18px', borderRadius: 10,
          background: 'rgba(248,113,113,0.1)', border: '1px solid rgba(248,113,113,0.3)',
          color: '#fca5a5', fontSize: '0.84rem', maxWidth: 560, width: '100%'
        }}>
          {error}
        </div>
      )}

      <div style={{ marginTop: 24, textAlign: 'center' }}>
        <p style={{ color: 'rgba(255,255,255,0.3)', fontSize: '0.8rem', marginBottom: 12 }}>&mdash; or &mdash;</p>
        <button
          onClick={onSampleData}
          style={{
            padding: '12px 32px', borderRadius: 12, cursor: 'pointer', fontWeight: 700, fontSize: '0.9rem',
            background: 'linear-gradient(135deg, #c9a84c, #e8c97e)',

            transition: 'opacity 0.2s'
          }}
          onMouseEnter={e => e.target.style.opacity = '0.88'}
          onMouseLeave={e => e.target.style.opacity = '1'}
        >
          Load Sample Data
        </button>
        <p style={{ color: 'rgba(255,255,255,0.25)', fontSize: '0.75rem', marginTop: 8 }}>
          Demo with 8 weeks of synthetic M&amp;A candidate activity
        </p>
      </div>

      <div className="glass-card" style={{ marginTop: 40, maxWidth: 560, width: '100%', padding: '20px 24px' }}>
        <p style={{ color: '#c9a84c', fontWeight: 700, fontSize: '0.83rem', textTransform: 'uppercase', letterSpacing: '0.08em', marginBottom: 12 }}>Required files inside your .zip</p>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
          {['Connections.csv','messages.csv','Invitations.csv'].map(f => (
            <div key={f} style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
              <div style={{ width: 6, height: 6, borderRadius: '50%', background: '#c9a84c', flexShrink: 0 }}/>
              <span style={{ color: 'rgba(255,255,255,0.6)', fontSize: '0.82rem', fontFamily: 'monospace' }}>{f}</span>
            </div>
          ))}
        </div>
        <p style={{ color: 'rgba(255,255,255,0.25)', fontSize: '0.75rem', marginTop: 14 }}>
          All data is processed locally in your browser. Nothing is uploaded to any server.
        </p>
      </div>
    </div>
  );

    setState('dashboard');
  };

  const handleSampleData = () => {
    const { invitations, messages, connections, ME } = generateSampleData();
    const { weekData, ME: detectedME } = processData(invitations, messages, connections);
    setWeekData(weekData);
    setME(detectedME || ME);
    setWarnings([]);
    setState('dashboard');
  };

  const handleReset = () => {
    setState('upload');
    setWeekData([]);
    setME('');
    setWarnings([]);
  };

  if (state === 'upload') {
    return <UploadScreen onDataLoaded={handleDataLoaded} onSampleData={handleSampleData} />;
  }

  if (state === 'dashboard') {
    return (
      <>
        {warnings.length > 0 && (
          <div style={{
            background: 'rgba(251,191,36,0.1)', borderBottom: '1px solid rgba(251,191,36,0.2)',
            padding: '10px 24px', textAlign: 'center',
            color: '#fbbf24', fontSize: '0.8rem'
          }}>
            Some CSVs were missing from your export: <strong>{warnings.join(', ')}</strong>. Metrics may be incomplete.
          </div>
        )}
        <Dashboard weekData={weekData} ME={ME} onReset={handleReset} />
      </>
    );
  }

  return null;
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
