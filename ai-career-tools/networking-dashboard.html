// ─── Constants ────────────────────────────────────────────────────────────────
const BENCHMARKS = { requestsSent: 20, acceptanceRate: 40, messagesSent: 20, catchupsBooked: 2 };

const QUARTILE_CONFIG = {
  requestsSent:   [{ max:10,q:'Q1',label:'Below target',color:'#ef4444'},{max:20,q:'Q2',label:'Getting there',color:'#f59e0b'},{max:30,q:'Q3',label:'On target',color:'#a855f7'},{max:Infinity,q:'Q4',label:'Exceeding target',color:'#ec4899'}],
  acceptanceRate: [{ max:20,q:'Q1',label:'Below target',color:'#ef4444'},{max:40,q:'Q2',label:'Getting there',color:'#f59e0b'},{max:60,q:'Q3',label:'On target',color:'#a855f7'},{max:Infinity,q:'Q4',label:'Exceeding target',color:'#ec4899'}],
  messagesSent:   [{ max:10,q:'Q1',label:'Below target',color:'#ef4444'},{max:20,q:'Q2',label:'Getting there',color:'#f59e0b'},{max:30,q:'Q3',label:'On target',color:'#a855f7'},{max:Infinity,q:'Q4',label:'Exceeding target',color:'#ec4899'}],
  catchupsBooked: [{ max:0, q:'Q1',label:'Below target',color:'#ef4444'},{max:1, q:'Q2',label:'Getting there',color:'#f59e0b'},{max:2, q:'Q3',label:'On target',color:'#a855f7'},{max:Infinity,q:'Q4',label:'Exceeding target',color:'#ec4899'}],
};

function getQuartile(metricKey, value) {
  const bands = QUARTILE_CONFIG[metricKey];
  if (!bands) return { q:'Q2', label:'Getting there', color:'#f59e0b' };
  return bands.find(b => value <= b.max) || bands[bands.length - 1];
}

// ─── CSV Parsing ──────────────────────────────────────────────────────────────
function parseLinkedInDate(str) {
  if (!str) return null;
  const s = str.trim();
  const d = new Date(s);
  if (!isNaN(d)) return d;
  const m = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if (m) return new Date(parseInt(m[3]), parseInt(m[1])-1, parseInt(m[2]));
  return null;
}

function getWeekKey(date) {
  const d = new Date(date);
  d.setHours(0,0,0,0);
  const day = d.getDay();
  d.setDate(d.getDate() - (day === 0 ? 6 : day - 1));
  return d.toISOString().slice(0,10);
}

function detectCSVType(headers) {
  const h = headers.map(x => (x||'').toLowerCase().trim());
  if (h.some(x => x.includes('connected on') || x.includes('connected_on'))) return 'connections';
  if (h.some(x => x.includes('direction') || x.includes('sent at') || x.includes('invitation'))) return 'invitations';
  if (h.some(x => x === 'from' || x === 'to' || x === 'content' || x === 'date')) return 'messages';
  if (h.some(x => x.includes('first name') || x.includes('last name'))) return 'connections';
  return 'unknown';
}

function parseCSV(text, type) {
  const lines = text.split('\n');
  let startIdx = 0;
  const knownHeaders = {
    connections: ['first name','last name','connected on','company','position'],
    invitations: ['from','to','sent at','direction','message'],
    messages: ['from','to','date','subject','content'],
  };
  const keywords = knownHeaders[type] || [];

  for (let i = 0; i < Math.min(8, lines.length); i++) {
    const lower = lines[i].toLowerCase();
    if (keywords.some(k => lower.includes(k))) { startIdx = i; break; }
  }

  const cleanedText = lines.slice(startIdx).join('\n');
  const parsed = Papa.parse(cleanedText, { header: true, skipEmptyLines: true, transformHeader: h => h.trim() });
  return parsed.data;
}

function processCSVData(csvData) {
  const result = { connections: [], invitations: [], messages: [] };

  Object.entries(csvData).forEach(([type, rows]) => {
    if (type === 'connections') {
      result.connections = rows.map(r => ({
        name: ((r['First Name']||r['first name']||'') + ' ' + (r['Last Name']||r['last name']||'')).trim(),
        company:   r['Company']   || r['company']   || '',
        position:  r['Position']  || r['position']  || '',
        connectedOn: parseLinkedInDate(r['Connected On'] || r['connected on'] || r['Date'] || r['date']),
      })).filter(r => r.connectedOn);

    } else if (type === 'invitations') {
      result.invitations = rows.map(r => ({
        direction: (r['Direction'] || r['direction'] || '').toLowerCase(),
        sentAt: parseLinkedInDate(r['Sent At'] || r['sent at'] || r['Date'] || r['date']),
      })).filter(r => r.sentAt);

    } else if (type === 'messages') {
      result.messages = rows.map(r => ({
        from:    r['FROM']    || r['From']    || r['from']    || '',
        to:      r['TO']      || r['To']      || r['to']      || '',
        date:    parseLinkedInDate(r['DATE'] || r['Date'] || r['date']),
        subject: r['SUBJECT'] || r['Subject'] || r['subject'] || '',
        content: r['CONTENT'] || r['Content'] || r['content'] || '',
      })).filter(r => r.date);
    }
  });

  return result;
}

function aggregateByWeek(data) {
  const weeks = {};
  const ensure = (key) => {
    if (!weeks[key]) weeks[key] = { key, label:'', requestsSent:0, accepted:0, messagesSent:0, connections:[], messages:[] };
  };

  data.invitations.forEach(inv => {
    if (!inv.sentAt) return;
    const wk = getWeekKey(inv.sentAt);
    ensure(wk);
    if (inv.direction === 'sent' || inv.direction === 'outgoing') weeks[wk].requestsSent++;
  });

  data.connections.forEach(c => {
    if (!c.connectedOn) return;
    const wk = getWeekKey(c.connectedOn);
    ensure(wk);
    weeks[wk].connections.push(c);
  });

  data.messages.forEach(m => {
    if (!m.date) return;
    const wk = getWeekKey(m.date);
    ensure(wk);
    weeks[wk].messagesSent++;
    weeks[wk].messages.push(m);
  });

  const sorted = Object.values(weeks).sort((a,b) => a.key.localeCompare(b.key));
  sorted.forEach(w => {
    const d = new Date(w.key);
    w.label = d.toLocaleDateString('en-AU', { day:'numeric', month:'short' });
    w.acceptanceRate = w.requestsSent > 0 ? Math.min(100, Math.round((w.connections.length / w.requestsSent) * 100)) : 0;
    w.catchupsBooked = 0;
  });

  return sorted.slice(-12);
}

// ─── Sample Data ──────────────────────────────────────────────────────────────
function buildSampleData() {
  const now = new Date();
  const NAMES = ['Sarah Chen','James Okafor','Priya Nair','Luca Rossi','Emma Walsh','Tom Nguyen','Aisha Patel','Ben Murray'];
  const ROLES = ['Software Engineer','Product Manager','Data Analyst','UX Designer','Marketing Lead','Finance Analyst','HR Manager','Ops Lead'];
  const COS   = ['Atlassian','Canva','ANZ Bank','Afterpay','REA Group','Seek','Xero','WiseTech'];
  const MSGS  = ['Hey, loved your work — would be great to connect!','Following up on my earlier message, keen to chat.','Hi, saw you work in product — would love a coffee catch-up.','Noticed we have mutual connections, thought I\'d reach out.'];
  return Array.from({ length: 12 }, (_, i) => {
    const d = new Date(now); d.setDate(d.getDate() - (11-i) * 7);
    const requestsSent = Math.floor(Math.random()*15)+12;
    const accepted = Math.floor(requestsSent*(0.3+Math.random()*0.35));
    const messagesSent = Math.floor(Math.random()*15)+12;
    return {
      key: getWeekKey(d),
      label: d.toLocaleDateString('en-AU', { day:'numeric', month:'short' }),
      requestsSent, accepted,
      acceptanceRate: Math.round((accepted/requestsSent)*100),
      messagesSent, catchupsBooked: Math.floor(Math.random()*3),
      connections: Array.from({ length: accepted }, (_,j) => ({ name:NAMES[j%8], position:ROLES[j%8], company:COS[j%8], connectedOn:d })),
      messages: Array.from({ length: messagesSent }, (_,j) => ({ from:'Me', to:NAMES[j%8], date:d, subject:'Following up', content:MSGS[j%4] })),
    };
  });
}

// ─── Supabase helpers ─────────────────────────────────────────────────────────
async function loadWeekDataFromDB(userId) {
  const { data: weekRows, error: weekErr } = await supabase
    .from('networking_weeks')
    .select('*')
    .eq('user_id', userId)
    .order('week_key', { ascending: true })
    .limit(12);

  if (weekErr || !weekRows || weekRows.length === 0) return null;

  const weekKeys = weekRows.map(r => r.week_key);

  const [{ data: connRows }, { data: msgRows }] = await Promise.all([
    supabase.from('connections').select('*').eq('user_id', userId).in('week_key', weekKeys),
    supabase.from('messages').select('*').eq('user_id', userId).in('week_key', weekKeys),
  ]);

  return weekRows.map(w => ({
    key: w.week_key,
    label: w.week_label || new Date(w.week_key).toLocaleDateString('en-AU', { day:'numeric', month:'short' }),
    requestsSent: w.requests_sent,
    acceptanceRate: w.acceptance_rate,
    messagesSent: w.messages_sent,
    catchupsBooked: w.catchups_booked,
    connections: (connRows || [])
      .filter(c => c.week_key === w.week_key)
      .map(c => ({ name: c.name, position: c.position, company: c.company, connectedOn: c.connected_on ? new Date(c.connected_on) : null })),
    messages: (msgRows || [])
      .filter(m => m.week_key === w.week_key)
      .map(m => ({ to: m.recipient, content: m.content, date: m.sent_at ? new Date(m.sent_at) : null, from: '', subject: '' })),
  }));
}

async function saveWeekDataToDB(userId, weekData) {
  // Upsert networking_weeks
  const weekUpserts = weekData.map(w => ({
    user_id: userId,
    week_key: w.key,
    week_label: w.label,
    requests_sent: w.requestsSent,
    acceptance_rate: w.acceptanceRate,
    messages_sent: w.messagesSent,
    catchups_booked: w.catchupsBooked,
  }));

  const { error: weekErr } = await supabase
    .from('networking_weeks')
    .upsert(weekUpserts, { onConflict: 'user_id,week_key' });

  if (weekErr) throw weekErr;

  const weekKeys = weekData.map(w => w.key);

  // Delete then insert connections
  await supabase.from('connections').delete().eq('user_id', userId).in('week_key', weekKeys);
  const connInserts = weekData.flatMap(w =>
    (w.connections || []).map(c => ({
      user_id: userId,
      week_key: w.key,
      name: c.name || '',
      position: c.position || '',
      company: c.company || '',
      connected_on: c.connectedOn ? new Date(c.connectedOn).toISOString().slice(0,10) : null,
    }))
  );
  if (connInserts.length > 0) {
    const { error: connErr } = await supabase.from('connections').insert(connInserts);
    if (connErr) throw connErr;
  }

  // Delete then insert messages
  await supabase.from('messages').delete().eq('user_id', userId).in('week_key', weekKeys);
  const msgInserts = weekData.flatMap(w =>
    (w.messages || []).map(m => ({
      user_id: userId,
      week_key: w.key,
      recipient: m.to || '',
      content: m.content || '',
      is_catchup: false,
      sent_at: m.date ? new Date(m.date).toISOString().slice(0,10) : null,
    }))
  );
  if (msgInserts.length > 0) {
    const { error: msgErr } = await supabase.from('messages').insert(msgInserts);
    if (msgErr) throw msgErr;
  }
}

async function updateCatchupsInDB(userId, weekKey, catchupsBooked) {
  await supabase
    .from('networking_weeks')
    .update({ catchups_booked: catchupsBooked })
    .eq('user_id', userId)
    .eq('week_key', weekKey);
}

// ─── Sparkline ────────────────────────────────────────────────────────────────
function Sparkline({ data, color }) {
  const ref = useRef(null);
  useEffect(() => {
    if (!ref.current || !window.Plotly || !data || data.length < 2) return;
    const el = ref.current;
    window.Plotly.newPlot(el,
      [{ x: data.map((_,i)=>i), y: data, type:'scatter', mode:'lines', line:{ color, width:2, shape:'spline' }, fill:'tozeroy', hoverinfo:'none' }],
      { margin:{t:0,b:0,l:0,r:0}, paper_bgcolor:'rgba(0,0,0,0)', plot_bgcolor:'rgba(0,0,0,0)', xaxis:{visible:false,fixedrange:true}, yaxis:{visible:false,fixedrange:true}, showlegend:false },
      { displayModeBar:false, staticPlot:true, responsive:true }
    );
    return () => { try { window.Plotly.purge(el); } catch(e) {} };
  }, [data, color]);
  return <div ref={ref} className="sparkline-wrap" />;
}

// ─── Main Chart ───────────────────────────────────────────────────────────────
function MainChart({ weekData }) {
  const ref = useRef(null);
  useEffect(() => {
    if (!ref.current || !window.Plotly || !weekData?.length) return;
    const el = ref.current;
    const labels = weekData.map(w => w.label);
    const COLORS = ['#a855f7','#ec4899','#f472b6','#c084fc'];
    const series = [
      { name:'Requests Sent', y: weekData.map(w=>w.requestsSent),   c: COLORS[0] },
      { name:'Acceptance %',  y: weekData.map(w=>w.acceptanceRate), c: COLORS[1] },
      { name:'Messages Sent', y: weekData.map(w=>w.messagesSent),   c: COLORS[2] },
      { name:'Catch-ups',     y: weekData.map(w=>w.catchupsBooked), c: COLORS[3] },
    ];
    const traces = series.map(t => ({ name:t.name, x:labels, y:t.y, type:'scatter', mode:'lines+markers', line:{width:2.5,shape:'spline',color:t.c}, marker:{size:6,color:t.c} }));
    const blines = Object.entries(BENCHMARKS).map(([,v],i) => ({ x:[labels[0],labels[labels.length-1]], y:[v,v], mode:'lines', line:{dash:'dot',width:1,color:COLORS[i]}, showlegend:false, hoverinfo:'skip' }));
    window.Plotly.newPlot(el, [...traces,...blines], {
      paper_bgcolor:'rgba(0,0,0,0)', plot_bgcolor:'rgba(0,0,0,0)',
      font:{ family:'Inter, sans-serif', color:'rgba(255,255,255,0.7)', size:11 },
      margin:{t:20,b:50,l:40,r:20},
      legend:{ orientation:'h', y:-0.25, font:{color:'rgba(255,255,255,0.7)'} },
      xaxis:{ gridcolor:'rgba(255,255,255,0.06)', tickfont:{color:'rgba(255,255,255,0.5)',size:10}, zeroline:false },
      yaxis:{ gridcolor:'rgba(255,255,255,0.06)', tickfont:{color:'rgba(255,255,255,0.5)',size:10}, zeroline:false },
      hovermode:'x unified',
    }, { displayModeBar:false, responsive:true });
    return () => { try { window.Plotly.purge(el); } catch(e) {} };
  }, [weekData]);
  return <div ref={ref} style={{ width:'100%', height:280 }} />;
}

// ─── Metric Card ──────────────────────────────────────────────────────────────
function MetricCard({ title, value, suffix, metricKey, sparkData, benchmark }) {
  const q = getQuartile(metricKey, value);
  const pct = Math.min(100, Math.round((value / benchmark) * 100));
  return (
    <div className="glass-card p-4 metric-card-border" style={{ borderColor: q.color }}>
      <div className="flex items-start justify-between mb-1">
        <span style={{ color:'rgba(255,255,255,0.55)', fontSize:11, fontWeight:600, letterSpacing:'0.05em', textTransform:'uppercase' }}>{title}</span>
        <span style={{ background:q.color+'22', color:q.color, border:`1px solid ${q.color}44`, borderRadius:6, padding:'1px 6px', fontSize:10, fontWeight:700 }}>{q.q}</span>
      </div>
      <div className="flex items-end gap-1 mt-1">
        <span style={{ fontSize:28, fontWeight:800, color:'#fff', lineHeight:1 }}>{value}</span>
        {suffix && <span style={{ fontSize:13, color:'rgba(255,255,255,0.45)', marginBottom:3 }}>{suffix}</span>}
      </div>
      <div style={{ color:q.color, fontSize:11, marginTop:2, marginBottom:4 }}>{q.label}</div>
      <div style={{ height:4, borderRadius:4, background:'rgba(255,255,255,0.08)', margin:'6px 0' }}>
        <div style={{ height:'100%', borderRadius:4, background:q.color, width:pct+'%', transition:'width 0.5s ease' }} />
      </div>
      <div style={{ color:'rgba(255,255,255,0.3)', fontSize:10 }}>Benchmark: {benchmark}{suffix||''}</div>
      <Sparkline data={sparkData} color={q.color} />
    </div>
  );
}

// ─── Activity Log ─────────────────────────────────────────────────────────────
function ActivityLog({ weekData, onCatchupsChange }) {
  const [activeTab, setActiveTab] = useState('connections');
  const [manualCatchups, setManualCatchups] = useState({});

  useEffect(() => { setManualCatchups({}); }, [weekData?.key]);
  useEffect(() => {
    if (onCatchupsChange) onCatchupsChange(Object.values(manualCatchups).filter(Boolean).length);
  }, [manualCatchups]);

  const tabs = [
    { id:'connections', label:'Connections', count: weekData?.connections?.length || 0 },
    { id:'messages',    label:'Messages',    count: weekData?.messages?.length    || 0 },
  ];

  return (
    <div className="glass-card p-5" style={{ minHeight:260 }}>
      <div className="flex items-center gap-2 mb-4">
        {tabs.map(t => (
          <button key={t.id} onClick={() => setActiveTab(t.id)}
            className={`tab-btn px-4 py-1.5 rounded-full text-sm ${activeTab===t.id?'active':''}`}>
            {t.label} <span style={{ marginLeft:6, opacity:0.7, fontSize:11 }}>({t.count})</span>
          </button>
        ))}
      </div>

      {activeTab === 'connections' && (
        <div style={{ maxHeight:220, overflowY:'auto' }}>
          {!weekData?.connections?.length
            ? <p style={{ color:'rgba(255,255,255,0.35)', fontSize:13 }}>No connections this week.</p>
            : weekData.connections.map((c,i) => (

      {activeTab === 'messages' && (
        <div style={{ maxHeight:220, overflowY:'auto' }}>

            ? <p style={{ color:'rgba(255,255,255,0.35)', fontSize:13 }}>No messages this week.</p>
            : <>
                <div style={{ display:'grid', gridTemplateColumns:'1fr auto', gap:8, marginBottom:8, padding:'0 4px' }}>
                  <span style={{ color:'rgba(255,255,255,0.35)',fontSize:11,fontWeight:600,textTransform:'uppercase',letterSpacing:'0.04em' }}>Message</span>
                  <span style={{ color:'rgba(255,255,255,0.35)',fontSize:11,fontWeight:600,textTransform:'uppercase',letterSpacing:'0.04em' }}>Catch-up?</span>

                  <div key={i} style={{ display:'grid',gridTemplateColumns:'1fr auto',gap:8,alignItems:'center',padding:'6px 4px',borderBottom:'1px solid rgba(255,255,255,0.06)' }}>

                      <div style={{ color:'#fff',fontSize:12,fontWeight:600,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis' }}>{m.to||'Contact'}</div>

                    <div style={{ display:'flex',alignItems:'center',justifyContent:'center' }}>
                      <input type="checkbox" className="checkbox-catchup"
                        checked={!!manualCatchups[i]}

                ))}
              </>
          }

      )}
    </div>
  );
}

// ─── Upload Screen ────────────────────────────────────────────────────────────
const FILE_SLOTS = [
  { key:'connections', label:'Connections.csv', hint:'Has: First Name, Last Name, Connected On', required:true },
  { key:'invitations', label:'Invitations.csv',  hint:'Has: Direction, Sent At',                 required:true },
  { key:'messages',    label:'messages.csv',     hint:'Has: From, To, Date, Content',            required:false },
];

function UploadScreen({ onData, onSample, user }) {
  const [files, setFiles]     = useState({});
  const [errors, setErrors]   = useState({});
  const [loading, setLoading] = useState(false);
  const [saving, setSaving]   = useState(false);
  const [globalDrag, setGlobalDrag] = useState(false);

  const processFile = async (file) => {
    const text = await file.text();
    const lower = file.name.toLowerCase();

    let type = 'unknown';
    if (lower.includes('connection'))  type = 'connections';
    else if (lower.includes('invit'))  type = 'invitations';
    else if (lower.includes('message'))type = 'messages';
    else {
      const firstLine = text.split('\n').slice(0,5).join('\n');
      const probe = Papa.parse(firstLine, { header:true, skipEmptyLines:true });
      type = detectCSVType(probe.meta?.fields || []);
    }

    if (type === 'unknown') {
      return { error: `Can't detect type for "${file.name}" — rename it to Connections.csv, Invitations.csv, or messages.csv` };
    }

    const rows = parseCSV(text, type);
    return { type, name: file.name, rows, count: rows.length };
  };

  const handleFiles = async (fileList) => {
    setLoading(true);
    const newFiles = { ...files };
    const newErrors = { ...errors };

    for (const file of Array.from(fileList)) {
      if (!file.name.endsWith('.csv')) { newErrors['_'] = `"${file.name}" is not a CSV file.`; continue; }
      const result = await processFile(file);
      if (result.error) { newErrors['_'] = result.error; continue; }
      newFiles[result.type] = { name: result.name, rows: result.rows, count: result.count };
      delete newErrors[result.type];
    }

    setFiles(newFiles);
    setErrors(newErrors);
    setLoading(false);
  };

  const handleGlobalDrop = (e) => {
    e.preventDefault(); setGlobalDrag(false);
    handleFiles(e.dataTransfer.files);
  };

  const canGo = files.connections || files.invitations;

  const handleGo = async () => {
    const csvData = {};
    Object.entries(files).forEach(([k, v]) => { csvData[k] = v.rows; });
    const processed = processCSVData(csvData);
    const weeks = aggregateByWeek(processed);

    if (user) {
      setSaving(true);
      try {
        await saveWeekDataToDB(user.id, weeks);
      } catch (err) {
        console.error('Failed to save to Supabase:', err);
        // Non-fatal — still show dashboard
      }
      setSaving(false);
    }

    onData(weeks);
  };

  return (
    <div className="min-h-screen flex flex-col items-center justify-center p-6"
      style={{ background:'linear-gradient(135deg, #120818 0%, #1e0a30 100%)' }}
      onDragOver={e => { e.preventDefault(); setGlobalDrag(true); }}
      onDragLeave={() => setGlobalDrag(false)}
      onDrop={handleGlobalDrop}>

      {globalDrag && (
        <div style={{ position:'fixed',inset:0,background:'rgba(217,70,239,0.12)',border:'3px solid #ec4899',zIndex:50,display:'flex',alignItems:'center',justifyContent:'center',pointerEvents:'none' }}>
          <p style={{ color:'#f9a8d4',fontSize:22,fontWeight:800 }}>Drop your CSV files anywhere</p>
        </div>
      )}

      <div style={{ maxWidth:560, width:'100%' }}>
        <div className="text-center mb-8">
          <div style={{ fontSize:13,fontWeight:700,letterSpacing:'0.15em',color:'#ec4899',textTransform:'uppercase',marginBottom:12 }}>Prepped Talent</div>
          <h1 style={{ fontSize:32,fontWeight:800,color:'#fff',lineHeight:1.15,marginBottom:10 }}>
            LinkedIn Networking<br/>Dashboard <span className="gradient-text">V2</span>
          </h1>
          <p style={{ color:'rgba(255,255,255,0.45)',fontSize:15 }}>
            Upload your LinkedIn CSV exports to track your networking performance.
          </p>
          {user && (
            <p style={{ color:'#a855f7',fontSize:13,marginTop:8 }}>
              Signed in as <strong style={{ color:'#f9a8d4' }}>{user.email}</strong> — data will be saved automatically.
            </p>
          )}
        </div>

        {/* File slots */}
        <div className="glass-card p-5 mb-4">
          <p style={{ color:'rgba(255,255,255,0.5)',fontSize:12,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.06em',marginBottom:12 }}>
            Drop CSVs below or anywhere on the page
          </p>
          <div style={{ display:'flex',flexDirection:'column',gap:8 }}>
            {FILE_SLOTS.map(slot => {
              const loaded = files[slot.key];
              return (
                <label key={slot.key} className={`file-slot ${loaded?'filled':'empty'} ${!slot.required?'optional':''}`} style={{ cursor:'pointer' }}>
                  <input type="file" accept=".csv" style={{ display:'none' }} multiple
                    onChange={e => handleFiles(e.target.files)} />
                  <div style={{ fontSize:22, flexShrink:0 }}>
                    {loaded ? '✅' : '📄'}
                  </div>
                  <div style={{ flex:1, minWidth:0 }}>
                    <div style={{ color: loaded?'#f9a8d4':'rgba(255,255,255,0.7)', fontWeight:600, fontSize:13 }}>
                      {loaded ? `${loaded.name} — ${loaded.count} rows` : slot.label}
                      {!slot.required && !loaded && <span style={{ color:'rgba(255,255,255,0.3)',fontWeight:400,marginLeft:6 }}>(optional)</span>}
                    </div>
                    {!loaded && <div style={{ color:'rgba(255,255,255,0.3)',fontSize:11,marginTop:2 }}>{slot.hint}</div>}
                  </div>
                  {loaded && (
                    <button onClick={e => { e.preventDefault(); setFiles(prev => { const n={...prev}; delete n[slot.key]; return n; }); }}
                      style={{ background:'rgba(239,68,68,0.15)',border:'1px solid rgba(239,68,68,0.3)',color:'#ef4444',borderRadius:6,padding:'2px 8px',fontSize:11,cursor:'pointer',flexShrink:0 }}>
                      ✕
                    </button>
                  )}
                </label>
              );
            })}
          </div>

          {errors['_'] && <p style={{ color:'#ef4444',fontSize:12,marginTop:8 }}>{errors['_']}</p>}
          {loading && <p style={{ color:'#ec4899',fontSize:12,marginTop:8 }}>Parsing…</p>}
        </div>

        <button onClick={handleGo} disabled={!canGo || saving}
          style={{ width:'100%',padding:'13px',borderRadius:12,fontSize:15,fontWeight:700,cursor:(canGo&&!saving)?'pointer':'not-allowed', border:'none',
            background: canGo ? 'linear-gradient(135deg,#ec4899,#a855f7)' : 'rgba(255,255,255,0.08)',
            color: canGo ? '#fff' : 'rgba(255,255,255,0.3)',
            transition:'all 0.2s', marginBottom:12,
            display:'flex',alignItems:'center',justifyContent:'center',gap:10,
          }}>
          {saving ? <><span className="spinner" style={{ width:18,height:18 }} /> Saving to your account…</> :
           canGo ? 'View My Dashboard →' : 'Upload at least Connections.csv or Invitations.csv'}
        </button>

        <div className="text-center mb-6">
          <button onClick={onSample}
            style={{ background:'rgba(217,70,239,0.1)',border:'1px solid rgba(217,70,239,0.3)',color:'#ec4899',borderRadius:10,padding:'9px 24px',fontSize:13,fontWeight:600,cursor:'pointer' }}>
            Use sample data instead
          </button>
        </div>

        {/* How-to */}
        <div className="glass-card-dark p-5">
          <p style={{ color:'rgba(255,255,255,0.5)',fontSize:12,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.06em',marginBottom:10 }}>How to get your LinkedIn CSVs</p>
          {[
            'Go to LinkedIn → Settings → Data Privacy → Get a copy of your data',
            'Select Connections, Invitations, Messages — click Request archive',
            'Wait for the email (up to 10 min), download the ZIP',
            'Unzip it — you\'ll find Connections.csv, Invitations.csv, messages.csv',
            'Drag those 3 files onto this page or click each slot above',
          ].map((s,i) => (
            <div key={i} className="flex items-start gap-3" style={{ marginBottom:6 }}>
              <span style={{ color:'#ec4899',fontWeight:800,fontSize:12,flexShrink:0,marginTop:1 }}>{i+1}.</span>
              <span style={{ color:'rgba(255,255,255,0.45)',fontSize:12 }}>{s}</span>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ─── Dashboard ────────────────────────────────────────────────────────────────
function Dashboard({ weekData: rawWeekData, onReset, user, onSignOut }) {
  const [selectedIdx, setSelectedIdx] = useState(rawWeekData.length - 1);
  const [showRolling, setShowRolling] = useState(false);
  const [catchupOverrides, setCatchupOverrides] = useState({});
  const debounceRef = useRef({});

  const rollingData = useMemo(() => rawWeekData.map((w,i) => {
    const slice = rawWeekData.slice(Math.max(0,i-3), i+1);
    const avg = k => Math.round(slice.reduce((s,x)=>s+(x[k]||0),0)/slice.length);
    return { ...w, requestsSent:avg('requestsSent'), acceptanceRate:avg('acceptanceRate'), messagesSent:avg('messagesSent'), catchupsBooked:avg('catchupsBooked') };
  }), [rawWeekData]);

  const displayData  = showRolling ? rollingData : rawWeekData;
  const selectedWeek = displayData[selectedIdx]  || displayData[displayData.length-1];
  const rawSelected  = rawWeekData[selectedIdx]  || rawWeekData[rawWeekData.length-1];
  const catchupCount = catchupOverrides[rawSelected?.key] !== undefined ? catchupOverrides[rawSelected.key] : (selectedWeek?.catchupsBooked||0);

  const handleCatchupsChange = useCallback((count) => {
    if (!rawSelected?.key) return;
    setCatchupOverrides(p => ({ ...p, [rawSelected.key]: count }));

    // Debounced DB update
    if (user) {
      if (debounceRef.current[rawSelected.key]) clearTimeout(debounceRef.current[rawSelected.key]);
      debounceRef.current[rawSelected.key] = setTimeout(() => {
        updateCatchupsInDB(user.id, rawSelected.key, count).catch(console.error);
      }, 1000);
    }
  }, [rawSelected?.key, user]);

  const spark = k => displayData.map(w => w[k]||0);
  const metrics = [
    { title:'Requests Sent',    value:selectedWeek?.requestsSent  ||0, suffix:'',  metricKey:'requestsSent',   sparkData:spark('requestsSent'),   benchmark:BENCHMARKS.requestsSent },
    { title:'Acceptance Rate',  value:selectedWeek?.acceptanceRate||0, suffix:'%', metricKey:'acceptanceRate', sparkData:spark('acceptanceRate'),  benchmark:BENCHMARKS.acceptanceRate },
    { title:'Messages Sent',    value:selectedWeek?.messagesSent  ||0, suffix:'',  metricKey:'messagesSent',   sparkData:spark('messagesSent'),    benchmark:BENCHMARKS.messagesSent },
    { title:'Catch-ups Booked', value:catchupCount,                     suffix:'',  metricKey:'catchupsBooked', sparkData:spark('catchupsBooked'),  benchmark:BENCHMARKS.catchupsBooked },
  ];

  return (
    <div style={{ minHeight:'100vh', background:'linear-gradient(135deg,#120818 0%,#1e0a30 100%)', padding:'24px 16px' }}>
      <div style={{ maxWidth:1100, margin:'0 auto' }}>

        {/* Header */}
        <div className="flex items-center justify-between mb-6 flex-wrap gap-3">
          <div>
            <div style={{ fontSize:11,fontWeight:700,letterSpacing:'0.15em',color:'#ec4899',textTransform:'uppercase' }}>Prepped Talent</div>
            <h1 style={{ fontSize:22,fontWeight:800,color:'#fff',margin:0 }}>Networking Dashboard <span className="gradient-text">V2</span></h1>
          </div>
          <div className="flex items-center gap-3 flex-wrap">
            {user && (
              <div style={{ display:'flex',alignItems:'center',gap:8 }}>
                <span style={{ color:'rgba(255,255,255,0.45)',fontSize:12,maxWidth:200,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap' }}>{user.email}</span>
                <button onClick={onSignOut}
                  style={{ background:'rgba(239,68,68,0.12)',border:'1px solid rgba(239,68,68,0.25)',color:'#ef4444',borderRadius:7,padding:'5px 11px',fontSize:11,fontWeight:600,cursor:'pointer' }}>
                  Sign out
                </button>
              </div>
            )}
            <div style={{ display:'flex',borderRadius:8,overflow:'hidden',border:'1px solid rgba(255,255,255,0.12)' }}>
              <button onClick={() => setShowRolling(false)} style={{ padding:'6px 14px',fontSize:12,fontWeight:600,cursor:'pointer',border:'none',borderRight:'1px solid rgba(255,255,255,0.12)',background:!showRolling?'rgba(217,70,239,0.2)':'transparent',color:!showRolling?'#f9a8d4':'rgba(255,255,255,0.4)' }}>Weekly</button>
              <button onClick={() => setShowRolling(true)}  style={{ padding:'6px 14px',fontSize:12,fontWeight:600,cursor:'pointer',border:'none',background:showRolling?'rgba(217,70,239,0.2)':'transparent',color:showRolling?'#f9a8d4':'rgba(255,255,255,0.4)' }}>4-Week Avg</button>
            </div>
            <button onClick={onReset} style={{ background:'rgba(255,255,255,0.07)',border:'1px solid rgba(255,255,255,0.12)',color:'rgba(255,255,255,0.5)',borderRadius:8,padding:'6px 14px',fontSize:12,cursor:'pointer' }}>← New Upload</button>
          </div>
        </div>

        {/* Week selector */}
        <div className="glass-card-dark p-3 mb-5 flex items-center gap-2 flex-wrap">
          <span style={{ color:'rgba(255,255,255,0.4)',fontSize:11,fontWeight:600,textTransform:'uppercase',letterSpacing:'0.06em',flexShrink:0 }}>Week of:</span>
          <div style={{ display:'flex',gap:4,flexWrap:'wrap' }}>
            {displayData.map((w,i) => (
              <button key={w.key} onClick={() => setSelectedIdx(i)}
                style={{ padding:'4px 10px',borderRadius:6,fontSize:11,fontWeight:600,cursor:'pointer',border:'none',
                  background: i===selectedIdx?'linear-gradient(135deg,#ec4899,#a855f7)':'rgba(255,255,255,0.07)',
                  color: i===selectedIdx?'#fff':'rgba(255,255,255,0.5)', transition:'all 0.15s' }}>
                {w.label}
              </button>
            ))}
          </div>
        </div>

        {/* Metric cards */}
        <div style={{ display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(210px,1fr))',gap:14,marginBottom:20 }}>
          {metrics.map(m => <MetricCard key={m.metricKey} {...m} />)}
        </div>

        {/* Chart */}
        <div className="glass-card p-5 mb-5">
          <div className="flex items-center justify-between mb-3">
            <h2 style={{ color:'#fff',fontWeight:700,fontSize:15,margin:0 }}>
              12-Week Trend {showRolling && <span style={{ color:'#ec4899',fontSize:12,fontWeight:500 }}>(4-week rolling avg)</span>}
            </h2>
            <span style={{ color:'rgba(255,255,255,0.3)',fontSize:11 }}>Dashed = benchmark</span>
          </div>
          <MainChart weekData={displayData} />
        </div>

        {/* Activity */}
        <div>
          <h2 style={{ color:'#fff',fontWeight:700,fontSize:15,marginBottom:10 }}>
            Activity — Week of {selectedWeek?.label}
            {showRolling && <span style={{ color:'rgba(255,255,255,0.35)',fontSize:12,fontWeight:400,marginLeft:8 }}>(raw data)</span>}
          </h2>
          <ActivityLog weekData={rawSelected} onCatchupsChange={handleCatchupsChange} />
        </div>

        {/* Quartile legend */}
        <div className="glass-card-dark p-4 mt-5 flex items-center gap-4 flex-wrap">
          <span style={{ color:'rgba(255,255,255,0.4)',fontSize:11,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.06em',flexShrink:0 }}>Quartile key:</span>
          {[{q:'Q1',label:'Below target',color:'#ef4444'},{q:'Q2',label:'Getting there',color:'#f59e0b'},{q:'Q3',label:'On target',color:'#a855f7'},{q:'Q4',label:'Exceeding target',color:'#ec4899'}].map(b => (
            <div key={b.q} className="flex items-center gap-1.5">
              <div style={{ width:10,height:10,borderRadius:3,background:b.color,flexShrink:0 }} />
              <span style={{ color:'rgba(255,255,255,0.55)',fontSize:11 }}><b style={{ color:b.color }}>{b.q}</b> {b.label}</span>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// Screens: 'loading' | 'login' | 'upload' | 'dashboard'
function App() {
  const [screen, setScreen]     = useState('loading');
  const [user, setUser]         = useState(null);
  const [weekData, setWeekData] = useState(null);
  const [loadMsg, setLoadMsg]   = useState('Loading…');

  // On mount: check existing session, then listen for auth changes
  useEffect(() => {
    let mounted = true;

    const init = async () => {
      const { data: { session } } = await supabase.auth.getSession();
      if (!mounted) return;

      if (session?.user) {
        setUser(session.user);
        await tryLoadDB(session.user, mounted);
      } else {
        setScreen('login');
      }
    };

    init();

    const { data: { subscription } } = supabase.auth.onAuthStateChange(async (event, session) => {
      if (!mounted) return;
      // Only act on actual sign-in (magic link callback) or sign-out
      // Ignore TOKEN_REFRESHED, USER_UPDATED etc. to avoid reload on tab focus
      if (event === 'SIGNED_IN' && session?.user) {
        setUser(session.user);
        // Only load from DB if this is a fresh login (not a token refresh)
        // Check if we're on the login screen to avoid re-loading when tab regains focus
        setScreen(prev => {
          if (prev === 'login' || prev === 'loading') {
            tryLoadDB(session.user, mounted);
          }
          return prev;
        });
      } else if (event === 'SIGNED_OUT') {
        setUser(null);
        setWeekData(null);
        setScreen('login');
      }
    });

    return () => { mounted = false; subscription.unsubscribe(); };
  }, []);

  const tryLoadDB = async (u, mounted) => {
    if (!mounted) return;
    setLoadMsg('Loading your saved data…');
    setScreen('loading');
    try {
      const data = await loadWeekDataFromDB(u.id);
      if (!mounted) return;
      if (data && data.length > 0) {
        setWeekData(data);
        setScreen('dashboard');
      } else {
        setScreen('upload');
      }
    } catch (err) {
      console.error('Error loading DB data:', err);
      if (mounted) setScreen('upload');
    }
  };

  const handleData = (weeks) => {
    setWeekData(weeks);
    setScreen('dashboard');
  };

  const handleSample = () => {
    setWeekData(buildSampleData());
    setScreen('dashboard');
  };

  const handleReset = () => {
    setScreen('upload');
  };

  const handleSignOut = async () => {
    await supabase.auth.signOut();
    // onAuthStateChange will handle state cleanup
  };

  const handleSkipLogin = () => {
    setScreen('upload');
  };

  if (screen === 'loading') return <LoadingScreen message={loadMsg} />;
  if (screen === 'login')   return <LoginScreen onSkip={handleSkipLogin} />;
  if (screen === 'upload')  return <UploadScreen onData={handleData} onSample={handleSample} user={user} />;
  if (screen === 'dashboard' && weekData) {
    return <Dashboard weekData={weekData} onReset={handleReset} user={user} onSignOut={handleSignOut} />;
  }

  // Fallback
  return <LoadingScreen message="Something went wrong. Refreshing…" />;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
